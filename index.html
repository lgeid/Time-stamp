<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Timemark Custom - Camera Support</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h2 { text-align: center; margin-top: 0; }
        .app-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .control-panel {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #cccccc; }
        .input-group input, .input-group select {
            width: 100%; padding: 10px; border: 1px solid #444; border-radius: 4px;
            background-color: #333; color: white; box-sizing: border-box; font-family: inherit;
        }
        
        /* Gaya Tombol */
        button {
            width: 100%; padding: 12px; background-color: #ff0000; color: white;
            border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        button:hover { background-color: #cc0000; }

        .btn-container {
            width: 100%;
            text-align: justify;
        }
        .btn-half {
            width: 48%;
            display: inline-block;
            margin-top: 0;
            font-size: 14px;
            padding: 10px;
        }
        .btn-gallery { background-color: #444444; }
        .btn-gallery:hover { background-color: #555555; }
        .btn-camera { background-color: #007bff; }
        .btn-camera:hover { background-color: #0056b3; }

        /* Area Preview Gambar */
        .preview-wrapper {
            display: flex; justify-content: center; background: #000;
            border: 1px solid #444; border-radius: 8px; overflow: hidden;
        }
        #canvas-container {
            position: relative; display: inline-block; max-width: 100%;
        }
        #preview-img {
            display: block; max-width: 100%; height: auto; object-fit: contain;
        }

        /* Gaya Teks Overlay */
        .overlay {
            position: absolute; color: white; text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8); pointer-events: none;
        }

        /* Pojok Kanan Atas */
        .top-right { top: 15px; right: 15px; text-align: right; }
        .top-right .logo-text { font-size: 18px; font-weight: bold; letter-spacing: 0.5px; }
        .logo-text .time-part { color: #f2c12e; transition: color 0.3s;} 
        .top-right .accuracy { font-size: 12px; opacity: 0.9; }

        /* Sisi Kanan Vertikal (Kode Verifikasi) */
        .right-edge {
            right: 15px;
            bottom: 50%; 
            transform: rotate(-90deg);
            transform-origin: right bottom;
            font-size: 10px;
            letter-spacing: 1px;
            opacity: 0.7;
            white-space: nowrap;
        }

        /* Pojok Kiri Bawah */
        .bottom-left{
            position:absolute;
            left:20px;
            bottom:25px;
            transform-origin:left bottom;
        }

        /* Kotak Waktu (Stempel) */
        .time-badge {
            background-color: #ff0000;
            color: white;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            line-height: 1; 
            transition: all 0.3s;
        }
        
        #out-time {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: none;
            vertical-align: middle;
        }

        .check-circle {
            background-color: white;
            color: #ff0000;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-block;
            text-align: center;
            line-height: 22px;
            font-size: 14px;
            font-weight: bold;
            vertical-align: middle;
            margin-left: 6px;
            transition: color 0.3s;
        }

        /* Kotak Informasi */
        .info-container {
            border-left: 3px solid #f2c12e;
            padding-left: 12px;
            transition: border-color 0.3s;
        }
        .info-title { font-size: 20px; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;}
        .info-date, .info-address { font-size: 14px; opacity: 0.95; margin-bottom: 3px;}

        hr { border: 1px solid #444; margin: 20px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Generator Timemark</h2>

    <div class="control-panel">
        <div class="input-group">
            <label>Pilih Gambar / Ambil Foto</label>
            <div class="btn-container">
                <button type="button" class="btn-half btn-gallery" onclick="document.getElementById('imageInput').click()">📁 Galeri / File</button>
                <button type="button" class="btn-half btn-camera" style="float: right;" onclick="document.getElementById('cameraInput').click()">📷 Kamera HP</button>
                <div style="clear: both;"></div>
            </div>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
        </div>

        <div class="input-group">
            <label>Waktu (Misal: 19:35)</label>
            <input type="text" id="timeInput" value="19:35">
        </div>
        <div class="input-group">
            <label>Judul Kegiatan (Misal: CARY IN)</label>
            <input type="text" id="titleInput" value="CARY IN">
        </div>
        <div class="input-group">
            <label>Tanggal & Waktu Zona (Misal: Minggu, 05 Juli 2026 WITA)</label>
            <input type="text" id="dateInput" value="Minggu, 05 Juli 2026 WITA">
        </div>
        <div class="input-group">
            <label>Alamat Baris 1</label>
            <input type="text" id="address1Input" value="Pallantikang, Kec. Pattallassang, Kabupaten">
        </div>
        <div class="input-group">
            <label>Alamat Baris 2 (Kota/Prov/Kode Pos)</label>
            <input type="text" id="address2Input" value="Gowa, Sulawesi Selatan 92173">
        </div>
        <div class="input-group">
            <label>Kode Verifikasi Kanan (Otomatis Acak)</label>
            <input type="text" id="verifyInput" value="">
        </div>

        <hr>

        <div class="input-group">
            <label>Tema Stempel Warna</label>
            <select id="themeSelect">
                <option value="red">1. Merah (Bawaan)</option>
                <option value="blue">2. Biru</option>
                <option value="green">3. Hijau</option>
                <option value="yellow">4. Kuning</option>
                <option value="purple">5. Ungu</option>
                <option value="orange">6. Oranye</option>
                <option value="cyan">7. Cyan</option>
                <option value="pink">8. Pink</option>
                <option value="brown">9. Coklat</option>
                <option value="black">10. Hitam / Gelap</option>
            </select>
        </div>

        <div class="input-group">
            <label>Mode Orientasi Gambar</label>
            <select id="modeSelect">
                <option value="portrait">Potret</option>
                <option value="landscape">Lanskap</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>Posisi Info Watermark</label>
            <select id="positionSelect">
                <option value="bottom">Bawah</option>
                <option value="top">Atas</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>Ukuran Info Watermark</label>
            <input type="range" id="sizeSlider" min="0.5" max="2" step="0.1" value="1">
        </div>
        
        <div class="input-group">
            <label>Geser Horizontal Info</label>
            <input type="range" id="xSlider" min="-300" max="300" value="0">
        </div>
        
        <div class="input-group">
            <label>Geser Vertikal Info</label>
            <input type="range" id="ySlider" min="-300" max="300" value="0">
        </div>

        <hr>

        <div class="input-group">
            <label>Ukuran Kode Verifikasi Kanan</label>
            <input type="range" id="verifySizeSlider" min="0.5" max="2" step="0.1" value="1">
        </div>

        <div class="input-group">
            <label>Geser Vertikal Kode Verifikasi (Atas/Bawah)</label>
            <input type="range" id="verifyYSlider" min="-400" max="400" value="0">
        </div>

        <div class="input-group">
            <label>Geser Horizontal Kode Verifikasi (Kiri/Kanan)</label>
            <input type="range" id="verifyXSlider" min="-150" max="150" value="0">
        </div>

        <button onclick="downloadImage()">Simpan Gambar</button>
    </div>

    <div class="preview-wrapper">
        <div id="canvas-container">
            <img id="preview-img" src="https://via.placeholder.com/600x800/333333/555555?text=Pilih+Sumber+Foto+Di+Atas" alt="Preview">
            
            <div class="overlay top-right">
                <div class="logo-text"><span class="time-part">Time</span>mark</div>
                <div class="accuracy">Foto 100% akurat</div>
            </div>

            <div class="overlay right-edge" id="out-verify"></div>

            <div class="overlay bottom-left">
                <div class="time-badge">
                    <span id="out-time">19:35</span><div class="check-circle">✔</div>
                </div>
                <div class="info-container">
                    <div class="info-title" id="out-title">CARY IN</div>
                    <div class="info-date" id="out-date">Minggu, 05 Juli 2026 WITA</div>
                    <div class="info-address" id="out-address1">Pallantikang, Kec. Pattallassang, Kabupaten</div>
                    <div class="info-address" id="out-address2">Gowa, Sulawesi Selatan 92173</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // FUNGSI KODE ACAK OTOMATIS
    function generateRandomCode(length) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    window.onload = function() {
        const randomStr = generateRandomCode(14) + ' Timemark Verified';
        document.getElementById('verifyInput').value = randomStr;
        document.getElementById('out-verify').innerText = '🛡️ ' + randomStr;
    };

    const imageInput = document.getElementById('imageInput');
    const cameraInput = document.getElementById('cameraInput');
    const previewImg = document.getElementById('preview-img');

    // Handler membaca file / hasil tangkapan kamera
    function prosesGambar(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                previewImg.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    imageInput.addEventListener('change', prosesGambar);
    cameraInput.addEventListener('change', prosesGambar);

    function syncInput(inputId, outputId, prefix = "") {
        document.getElementById(inputId).addEventListener('input', function(e) {
            document.getElementById(outputId).innerText = prefix + e.target.value;
        });
    }

    syncInput('timeInput', 'out-time');
    syncInput('titleInput', 'out-title');
    syncInput('dateInput', 'out-date');
    syncInput('address1Input', 'out-address1');
    syncInput('address2Input', 'out-address2');
    syncInput('verifyInput', 'out-verify', '🛡️ '); 

    function downloadImage() {
        const container = document.getElementById('canvas-container');
        
        html2canvas(container, {
            useCORS: true,
            scale: 2
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'timemark-camera.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    // Fungsi 10 Tema Warna
    const themes = {
        red: { badge: '#ff0000', text: '#ffffff', check: '#ff0000', accent: '#f2c12e' },
        blue: { badge: '#007bff', text: '#ffffff', check: '#007bff', accent: '#00d2ff' },
        green: { badge: '#28a745', text: '#ffffff', check: '#28a745', accent: '#b2ff59' },
        yellow: { badge: '#ffc107', text: '#000000', check: '#ffc107', accent: '#ff9800' },
        purple: { badge: '#6f42c1', text: '#ffffff', check: '#6f42c1', accent: '#e040fb' },
        orange: { badge: '#fd7e14', text: '#ffffff', check: '#fd7e14', accent: '#ffea00' },
        cyan: { badge: '#17a2b8', text: '#ffffff', check: '#17a2b8', accent: '#00e5ff' },
        pink: { badge: '#e83e8c', text: '#ffffff', check: '#e83e8c', accent: '#ff8a80' },
        brown: { badge: '#795548', text: '#ffffff', check: '#795548', accent: '#d7ccc8' },
        black: { badge: '#343a40', text: '#ffffff', check: '#343a40', accent: '#aaaaaa' }
    };

    document.getElementById('themeSelect').addEventListener('change', function() {
        const theme = themes[this.value];
        document.querySelector('.time-badge').style.backgroundColor = theme.badge;
        document.querySelector('.time-badge').style.color = theme.text;
        document.querySelector('.check-circle').style.color = theme.check;
        document.querySelector('.info-container').style.borderLeftColor = theme.accent;
        document.querySelector('.time-part').style.color = theme.accent;
    });

    // Fungsi Update Watermark Utama
    const watermark = document.querySelector(".bottom-left");

    function updateWatermark(){
        const posisi = document.getElementById("positionSelect").value;
        const ukuran = document.getElementById("sizeSlider").value;
        const x = document.getElementById("xSlider").value;
        const y = document.getElementById("ySlider").value;

        watermark.style.top = "";
        watermark.style.bottom = "";

        if(posisi=="top"){
            watermark.style.top="25px";
        }else{
            watermark.style.bottom="25px";
        }

        watermark.style.transform = `translate(${x}px,${y}px) scale(${ukuran})`;
    }

    document.getElementById("positionSelect").oninput=updateWatermark;
    document.getElementById("sizeSlider").oninput=updateWatermark;
    document.getElementById("xSlider").oninput=updateWatermark;
    document.getElementById("ySlider").oninput=updateWatermark;
    updateWatermark();

    // Kode Orientasi Gambar 
    const img = document.getElementById("preview-img");
    document.getElementById("modeSelect").addEventListener("change",function(){
        if(this.value=="landscape"){
            img.style.maxWidth="800px";
            img.style.maxHeight="450px";
        }else{
            img.style.maxWidth="600px";
            img.style.maxHeight="900px";
        }
    });

    // Fungsi Baru: Transformasi Ukuran & Posisi Kode Verifikasi Kanan
    const watermarkVerify = document.getElementById("out-verify");

    function updateVerifyTransform(){
        const vSize = document.getElementById("verifySizeSlider").value;
        const vX = document.getElementById("verifyXSlider").value;
        const vY = document.getElementById("verifyYSlider").value;
        
        // Translasi posisi layar, kemudian dirotasi 90 derajat, lalu di-skala
        watermarkVerify.style.transform = `translate(${vX}px, ${vY}px) rotate(-90deg) scale(${vSize})`;
    }

    document.getElementById("verifySizeSlider").oninput = updateVerifyTransform;
    document.getElementById("verifyXSlider").oninput = updateVerifyTransform;
    document.getElementById("verifyYSlider").oninput = updateVerifyTransform;
    updateVerifyTransform();
</script>

</body>
</html>
