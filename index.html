<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanted™ Timemark Pro - Stabil</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-main: #1e1e1e;
            --bg-panel: #2a2a2a;
            --bg-input: #333;
            --text-main: #ffffff;
            --text-muted: #cccccc;
            --border-color: #444;
            --primary: #ff0000;
            --primary-hover: #cc0000;
            --secondary: #007bff;
            --success: #28a745;
            --accent: #f2c12e;
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
            --stempel-scale: 1;
        }

        .light-mode {
            --bg-main: #f5f5f5;
            --bg-panel: #ffffff;
            --bg-input: #f0f0f0;
            --text-main: #222222;
            --text-muted: #555555;
            --border-color: #dddddd;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 15px;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        h2 { text-align: center; margin-bottom: 20px; font-size: 24px; font-weight: 700; }

        .app-container { display: flex; flex-direction: column; gap: 20px; max-width: 850px; margin: 0 auto; }
        .control-panel { background-color: var(--bg-panel); padding: 20px; border-radius: 12px; box-shadow: var(--shadow); transition: background-color 0.3s ease; }
        
        .section-title {
            font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
            margin: 20px 0 10px 0; padding-bottom: 5px; border-bottom: 1px solid var(--border-color); font-weight: bold;
        }
        .section-title:first-child { margin-top: 0; }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        .panel-title { font-size: 18px; font-weight: 600; margin: 0; }
        .toggle-btn { background: none; border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .toggle-btn:hover { background-color: var(--bg-input); }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;
            background-color: var(--bg-input); color: var(--text-main); font-family: inherit; font-size: 15px;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(242, 193, 46, 0.2); }

        .slider-container { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
        .slider-container input[type="range"] { flex: 1; }
        
        button {
            width: 100%; padding: 13px; background-color: var(--primary); color: white; border: none; 
            border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .btn-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-half { flex: 1 1 calc(50% - 5px); min-width: 140px; font-size: 14px; padding: 11px; margin: 0; }
        .btn-gallery { background-color: #555555; } .btn-gallery:hover { background-color: #666666; }
        .btn-camera { background-color: var(--secondary); } .btn-camera:hover { background-color: var(--secondary-hover); }
        .btn-switch { background-color: #9932CC; } .btn-switch:hover { background-color: #7B22A6; }
        .btn-secondary { background-color: #444; margin-top: 5px; } .btn-secondary:hover { background-color: #555; }

        .snap-btn-wrapper {
            display: none; justify-content: center; padding: 25px 0; background: rgba(0,0,0,0.7);
            border-radius: 0 0 8px 8px; margin-top: -4px; position: relative; z-index: 10;
        }
        .snap-btn-wrapper.show { display: flex; }
        .btn-snap {
            width: 72px; height: 72px; border: 5px solid #ffffff; border-radius: 50%;
            background: var(--success); box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.3); transition: all 0.15s ease;
            position: relative; cursor: pointer;
        }
        .btn-snap::after {
            content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 24px; height: 24px; background: white; border-radius: 4px;
        }
        .btn-snap:hover { transform: scale(1.05); background: var(--success-hover); }
        .btn-snap:active { transform: scale(0.95); }

        .btn-group-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .btn-group-row button { flex: 1; min-width: 120px; }

        #camera-stream-container { display: none; width: 100%; max-width: 100%; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; position: relative; }
        #video-stream { width: 100%; height: auto; display: block; transform: scaleX(1); transition: transform 0.2s ease; }
        #video-stream.user-facing { transform: scaleX(-1); }

        .preview-wrapper {
            display: flex; justify-content: center; background: #000; border: 2px solid var(--border-color); 
            border-radius: 12px; overflow: hidden; padding: 10px;
        }
        #canvas-container { position: relative; display: inline-block; max-width: 100%; box-shadow: var(--shadow); background: #000; }
        #preview-img { display: block; max-width: 100%; height: auto; object-fit: contain; border-radius: 4px; }

        .overlay { position: absolute; color: white; pointer-events: none; font-family: inherit; font-weight: 700 !important; }

        /* PETA MINI KIRI ATAS */
        .mini-map-container {
            position: absolute; top: 20px; left: 20px; width: 85px; height: 110px; background-color: #e0e6c8;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><path d="M20,0 L20,100 M60,0 L60,100 M0,30 L100,30 M0,70 L100,70" stroke="%23ffffff" stroke-width="4"/><path d="M30,-10 L80,110" stroke="%23f2c12e" stroke-width="6"/></svg>');
            border: 2px solid white; border-radius: 6px; box-shadow: 2px 2px 8px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 6px; z-index: 5;
        }
        .mini-map-container .pin { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 26px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .mini-map-container .coords { background: rgba(0,0,0,0.7); color: white; font-size: 9px; padding: 2px 4px; border-radius: 3px; letter-spacing: 0.5px; font-weight: 600; }

        .top-right { top: 20px; right: 20px; text-align: right; }
        .logo-text { font-size: 22px; font-weight: 900; letter-spacing: 0.5px; margin-bottom: 4px; }
        .logo-text .brand { color: #f2c12e; } 
        .accuracy { font-size: 13px; opacity: 0.95; font-weight: 500; }
        .right-edge { right: 15px; top: 140px; transform: rotate(-90deg); transform-origin: right top; font-size: 11px; letter-spacing: 1.2px; opacity: 0.85; white-space: nowrap; font-weight: 500; }

        /* === POSISI & UKURAN STEMPEL DIKUNCI MUTLAK === */
        .stempel-wrapper { 
            position: absolute !important; 
            bottom: 25px !important; 
            left: 20px !important; 
            max-width: 85% !important; 
            transform-origin: bottom left !important; 
            transform: scale(var(--stempel-scale)) !important; 
            line-height: 1.5 !important; 
            width: auto !important;
            height: auto !important;
        }
        .stempel-wrapper.bottom-right { left: auto !important; right: 20px !important; transform-origin: bottom right !important; }
        .stempel-wrapper.top-left { top: 140px !important; bottom: auto !important; transform-origin: top left !important; }
        .stempel-wrapper.top-right { top: 140px !important; bottom: auto !important; left: auto !important; right: 20px !important; transform-origin: top right !important; }

        /* === KOTAK WAKTU & CENTANG DIKUNCI 100% === */
        .time-badge {
            display: flex !important; 
            align-items: center !important; 
            justify-content: flex-start !important;
            flex-direction: row !important;
            min-height: 48px !important; 
            padding: 8px 16px !important; 
            border-radius: 8px !important;
            margin-bottom: 8px !important; 
            gap: 12px !important; 
            width: fit-content !important;
            position: relative !important;
            box-sizing: border-box !important;
        }
        #out-time { 
            font-size: 32px !important; 
            font-weight: 800 !important; 
            line-height: 1 !important; 
            margin: 0 !important; 
            padding: 0 !important;
            display: inline-block !important;
            flex-shrink: 0 !important;
            min-width: 60px !important;
        }
        
        /* Centang dijadikan elemen nyata, bukan pseudo */
        .check-circle {
            width: 28px !important; 
            height: 28px !important; 
            border-radius: 50% !important;
            display: inline-flex !important; 
            align-items: center !important; 
            justify-content: center !important;
            font-size: 16px !important; 
            font-weight: 900 !important;
            flex-shrink: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            position: relative !important;
            top: 0 !important;
            left: 0 !important;
        }
        .icon-v {
            display: inline !important;
            line-height: 1 !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        
        .info-container { display: block !important; margin-top: 8px !important; width: 100% !important; }
        .info-title { font-size: 24px !important; font-weight: 800 !important; margin-bottom: 6px !important; line-height: 1.2 !important; display: block !important; }
        .info-date, .info-address { font-size: 16px !important; margin-bottom: 4px !important; line-height: 1.4 !important; font-weight: 600 !important; display: block !important; }

        /* === GAYA STEMPEL DENGAN WARNA TETAP === */
        .style-klasik .time-badge { background-color: #ff0000 !important; box-shadow: 2px 2px 6px rgba(0,0,0,0.5) !important; }
        .style-klasik #out-time { color: #ffffff !important; }
        .style-klasik .check-circle { background-color: #ffffff !important; }
        .style-klasik .icon-v { color: #ff0000 !important; }
        .style-klasik .info-title, .style-klasik .info-date, .style-klasik .info-address { color: #ffffff !important; }

        .style-gelap .time-badge { background-color: #222222 !important; border: 1px solid #444444 !important; }
        .style-gelap #out-time { color: #ffffff !important; }
        .style-gelap .check-circle { background-color: #007bff !important; }
        .style-gelap .icon-v { color: #ffffff !important; }
        .style-gelap .info-container { border-left: 4px solid #007bff !important; padding-left: 12px !important; }
        .style-gelap .info-title, .style-gelap .info-date, .style-gelap .info-address { color: #ffffff !important; text-shadow: 1px 1px 2px black !important;}

        .style-kaca.stempel-wrapper { background: rgba(0, 0, 0, 0.45) !important; padding: 15px !important; border-radius: 12px !important; border: 1px solid rgba(255,255,255,0.2) !important;}
        .style-kaca .time-badge { background-color: transparent !important; padding: 0 !important; margin-bottom: 12px !important;}
        .style-kaca #out-time { color: #f2c12e !important; }
        .style-kaca .check-circle { background-color: #f2c12e !important; }
        .style-kaca .icon-v { color: #000000 !important; }
        .style-kaca .info-title, .style-kaca .info-date, .style-kaca .info-address { color: #ffffff !important; }

        .style-minimalis .time-badge { background-color: transparent !important; padding: 0 !important; margin-bottom: 5px !important; }
        .style-minimalis #out-time { color: #f2c12e !important; font-size: 38px !important; text-shadow: 2px 2px 0px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000 !important; }
        .style-minimalis .check-circle { display: none !important; }
        .style-minimalis .info-container { padding-top: 8px !important; border-top: 3px solid #f2c12e !important; }
        .style-minimalis .info-title, .style-minimalis .info-date, .style-minimalis .info-address { color: #ffffff !important; text-shadow: 1px 1px 3px black !important; }

        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 15px; }
        @keyframes snapFlash { 0% { opacity: 1; filter: brightness(1); } 50% { opacity: 0.7; filter: brightness(2); } 100% { opacity: 1; filter: brightness(1); } }
        .snap-flash { animation: snapFlash 0.3s ease-out; }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .right-edge { font-size: 9px; top: 120px; }
            .mini-map-container { width: 75px; height: 95px; }
            .mini-map-container .pin { font-size: 22px; }
            .stempel-wrapper { max-width: 90% !important; }
            #out-time { font-size: 28px !important; }
            .info-title { font-size: 20px !important; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>📸 Shanted™ Timemark Pro - Stabil</h2>

    <div class="control-panel">
        <div class="panel-header">
            <h3 class="panel-title">Pengaturan Utama</h3>
            <button class="toggle-btn" onclick="toggleTheme()">🌙 / ☀️ Mode</button>
        </div>

        <div class="section-title">1. Sumber Gambar</div>
        <div class="input-group">
            <div class="btn-container">
                <button type="button" class="btn-half btn-gallery" onclick="stopCamera(); document.getElementById('imageInput').click()">📁 Buka Galeri</button>
                <button type="button" class="btn-half btn-camera" onclick="startCamera()">📷 Kamera Langsung</button>
            </div>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>

        <div id="camera-stream-container">
            <video id="video-stream" autoplay playsinline muted></video>
            <div class="btn-group-row" style="padding: 12px;">
                <button type="button" class="btn-switch" id="switchCamBtn" onclick="switchCamera()">🔄 Kamera Depan/Belakang</button>
            </div>
            <div class="snap-btn-wrapper" id="snapBtnWrapper">
                <button type="button" class="btn-snap" id="snapBtn" onclick="takeSnapshot()"></button>
            </div>
        </div>

        <div class="section-title">2. Tampilan Stempel & Peta</div>
        <div class="settings-grid">
            <div class="input-group">
                <label>Gaya Stempel (Style)</label>
                <select id="styleSelect">
                    <option value="style-klasik" selected>Klasik Merah</option>
                    <option value="style-gelap">Gelap Elegan</option>
                    <option value="style-kaca">Kaca Modern (Glass)</option>
                    <option value="style-minimalis">Minimalis Outline</option>
                </select>
            </div>
            <div class="input-group">
                <label>Posisi Stempel</label>
                <select id="positionSelect">
                    <option value="bottom-left" selected>Kiri Bawah</option>
                    <option value="bottom-right">Kanan Bawah</option>
                    <option value="top-left">Kiri Atas</option>
                    <option value="top-right">Kanan Atas</option>
                </select>
            </div>
        </div>

        <div class="settings-grid">
            <div class="input-group">
                <label>Tampilkan Peta Kiri Atas?</label>
                <select id="mapToggle">
                    <option value="show" selected>Ya, Tampilkan</option>
                    <option value="hide">Sembunyikan</option>
                </select>
            </div>
            <div class="input-group">
                <label>Koordinat Peta</label>
                <input type="text" id="coordInput" value="-5.2341, 119.4522">
            </div>
        </div>

        <div class="input-group">
            <label>Ukuran Stempel</label>
            <div class="slider-container">
                <span>🔍 Kecil</span>
                <input type="range" id="stempelSize" min="0.6" max="1.5" step="0.05" value="1">
                <span>Besar 🔍</span>
            </div>
        </div>

        <div class="section-title">3. Teks Informasi</div>
        <div class="settings-grid">
            <div class="input-group">
                <label>Waktu (Jam:Menit)</label>
                <input type="text" id="timeInput" value="21:50">
            </div>
            <div class="input-group">
                <label>Tanggal & Zona</label>
                <input type="text" id="dateInput" value="Minggu, 5 Juli 2026 WITA">
            </div>
        </div>
        
        <div class="input-group">
            <label>Judul Kegiatan</label>
            <input type="text" id="titleInput" value="CARY IN">
        </div>
        <div class="input-group">
            <label>Alamat Baris 1</label>
            <input type="text" id="address1Input" value="Pallantikang, Kec. Pattallassang, Kabupaten">
        </div>
        <div class="input-group">
            <label>Alamat Baris 2</label>
            <input type="text" id="address2Input" value="Gowa, Sulawesi Selatan 92173">
        </div>
        <div class="input-group">
            <label>Kode Verifikasi Kanan</label>
            <input type="text" id="verifyInput" readonly placeholder="Dibuat otomatis">
        </div>

        <div class="btn-group-row">
            <button class="btn-secondary" onclick="generateRandomData()">🔄 Acak Kode & Titik</button>
            <button class="btn-secondary" onclick="autoFillDateTime()">🕒 Set Waktu Sekarang</button>
        </div>
        <button onclick="downloadImage()">💾 SIMPAN GAMBAR</button>
    </div>

    <div class="preview-wrapper">
        <div id="canvas-container">
            <img id="preview-img" src="https://via.placeholder.com/720x960/333333/555555?text=Pratinjau+Foto" alt="Pratinjau Hasil">
            
            <div class="overlay mini-map-container" id="miniMapWidget">
                <div class="pin">📍</div>
                <div class="coords" id="out-coords">-5.2341, 119.4522</div>
            </div>
            
            <div class="overlay top-right">
                <div class="logo-text"><span class="brand">Shanted™</span> Timemark</div>
                <div class="accuracy">Foto 100% akurat</div>
            </div>

            <div class="overlay right-edge" id="out-verify"></div>

            <div class="overlay stempel-wrapper bottom-left style-klasik" id="stempel-container">
                <div class="time-badge">
                    <span id="out-time">21:50</span>
                    <span class="check-circle"><span class="icon-v">✔</span></span>
                </div>
                <div class="info-container">
                    <div class="info-title" id="out-title">CARY IN</div>
                    <div class="info-date" id="out-date">Minggu, 5 Juli 2026 WITA</div>
                    <div class="info-address" id="out-address1">Pallantikang, Kec. Pattallassang, Kabupaten</div>
                    <div class="info-address" id="out-address2">Gowa, Sulawesi Selatan 92173</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let videoStreamTrack = null;
    let currentCameraMode = 'environment';

    function generateRandomVerifyCode() {
        const prefix = "ITVPSTR3";
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let randomPart = "";
        for (let i = 0; i < 6; i++) randomPart += chars.charAt(Math.floor(Math.random() * chars.length));
        return `${prefix}${randomPart}`;
    }

    function generateRandomCoord() {
        const lat = (Math.random() * (0 - 10) + 10) * -1; 
        const lng = Math.random() * (140 - 95) + 95;
        return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    }

    function generateRandomData() {
        const newCode = generateRandomVerifyCode();
        const newCoord = generateRandomCoord();
        document.getElementById('verifyInput').value = newCode;
        document.getElementById('out-verify').innerText = newCode;
        document.getElementById('coordInput').value = newCoord;
        document.getElementById('out-coords').innerText = newCoord;
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    function autoFillDateTime() {
        const now = new Date();
        const waktu = now.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
        const tanggal = now.toLocaleDateString('id-ID', {weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'}) + ' WITA';
        
        document.getElementById('timeInput').value = waktu;
        document.getElementById('dateInput').value = tanggal;
        document.getElementById('out-time').innerText = waktu;
        document.getElementById('out-date').innerText = tanggal;
    }

    window.onload = function() {
        if(localStorage.getItem('theme') === 'light') toggleTheme();
        generateRandomData();
        setupControls();
    };

    function setupControls() {
        const stempel = document.getElementById('stempel-container');
        
        document.getElementById('positionSelect').addEventListener('change', function(e) {
            stempel.classList.remove('bottom-left', 'bottom-right', 'top-left', 'top-right');
            stempel.classList.add(e.target.value);
        });

        document.getElementById('styleSelect').addEventListener('change', function(e) {
            stempel.classList.remove('style-klasik', 'style-gelap', 'style-kaca', 'style-minimalis');
            stempel.classList.add(e.target.value);
        });

        document.getElementById('mapToggle').addEventListener('change', function(e) {
            document.getElementById('miniMapWidget').style.display = e.target.value === 'show' ? 'flex' : 'none';
        });

        document.getElementById('stempelSize').addEventListener('input', function(e) {
            document.documentElement.style.setProperty('--stempel-scale', e.target.value);
        });

        const syncInputs = [
            { id: 'timeInput', target: 'out-time' },
            { id: 'titleInput', target: 'out-title' },
            { id: 'dateInput', target: 'out-date' },
            { id: 'address1Input', target: 'out-address1' },
            { id: 'address2Input', target: 'out-address2' },
            { id: 'coordInput', target: 'out-coords' }
        ];

        syncInputs.forEach(item => {
            document.getElementById(item.id).addEventListener('input', e => {
                document.getElementById(item.target).innerText = e.target.value;
            });
        });
    }

    async function startCamera() {
        stopCamera();
        const video = document.getElementById('video-stream');
        const snapWrapper = document.getElementById('snapBtnWrapper');
        const constraints = { video: { facingMode: currentCameraMode, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            videoStreamTrack = stream;
            video.classList.toggle('user-facing', currentCameraMode === 'user');
            
            document.getElementById('camera-stream-container').style.display = 'block';
            snapWrapper.classList.add('show');
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Gagal Akses Kamera' });
        }
    }

    async function switchCamera() {
        currentCameraMode = currentCameraMode === 'environment' ? 'user' : 'environment';
        await startCamera();
    }

    function stopCamera() {
        if (videoStreamTrack) {
            videoStreamTrack.getTracks().forEach(track => track.stop());
            document.getElementById('camera-stream-container').style.display = 'none';
            document.getElementById('snapBtnWrapper').classList.remove('show');
            videoStreamTrack = null;
        }
    }

    function takeSnapshot() {
        const video = document.getElementById('video-stream');
        if(!video.videoWidth) return;

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');

        if(currentCameraMode === 'user') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        document.getElementById('preview-img').src = canvas.toDataURL('image/jpeg', 0.98);
        
        const camContainer = document.getElementById('camera-stream-container');
        camContainer.classList.add('snap-flash');
        setTimeout(() => { camContainer.classList.remove('snap-flash'); stopCamera(); }, 300);
    }

    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = event => { document.getElementById('preview-img').src = event.target.result; }
        reader.readAsDataURL(file);
    });

    // === PERBAIKAN UTAMA: KUNCI SEMUA ELEMEN SAAT DISIMPAN ===
    function downloadImage() {
        Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        const container = document.getElementById('canvas-container');
        const skalaStempel = document.getElementById('stempelSize').value;
        const posisiStempel = document.getElementById('positionSelect').value;
        const gayaStempel = document.getElementById('styleSelect').value;
        
        html2canvas(container, { 
            useCORS: true, 
            scale: 3, 
            backgroundColor: null,
            allowTaint: true,
            logging: false,
            onclone: (clonedDoc) => {
                // Kunci posisi & gaya stempel mutlak
                const clonedStempel = clonedDoc.getElementById('stempel-container');
                clonedStempel.style.transform = `scale(${skalaStempel})`;
                clonedStempel.style.transformOrigin = getComputedStyle(clonedStempel).transformOrigin;
                clonedStempel.classList.remove('bottom-left', 'bottom-right', 'top-left', 'top-right', 'style-klasik', 'style-gelap', 'style-kaca', 'style-minimalis');
                clonedStempel.classList.add(posisiStempel, gayaStempel);

                // Kunci kotak waktu & jam
                const clonedTimeBadge = clonedDoc.querySelector('.time-badge');
                clonedTimeBadge.style.display = 'flex';
                clonedTimeBadge.style.alignItems = 'center';
                clonedTimeBadge.style.gap = '12px';
                clonedTimeBadge.style.padding = '8px 16px';
                clonedTimeBadge.style.marginBottom = '8px';

                const clonedTime = clonedDoc.getElementById('out-time');
                clonedTime.style.fontSize = '32px';
                clonedTime.style.fontWeight = '800';
                clonedTime.style.margin = '0';
                clonedTime.style.padding = '0';

                // Kunci centang agar tidak bergeser
                const clonedCheck = clonedDoc.querySelector('.check-circle');
                clonedCheck.style.display = 'inline-flex';
                clonedCheck.style.width = '28px';
                clonedCheck.style.height = '28px';
                clonedCheck.style.fontSize = '16px';
                clonedCheck.style.margin = '0';
                clonedCheck.style.padding = '0';
                clonedCheck.style.flexShrink = '0';

                const clonedIcon = clonedDoc.querySelector('.icon-v');
                clonedIcon.style.display = 'inline';
                clonedIcon.style.lineHeight = '1';
            }
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Timemark_Pro_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            Swal.fire({ icon: 'success', title: 'Berhasil Disimpan!', text: 'Jam dan centang sudah tetap di tempatnya ✅', confirmButtonColor: '#ff0000' });
        }).catch(err => {
            Swal.fire({ icon: 'error', title: 'Gagal Menyimpan', text: err.message });
        });
    }
</script>
