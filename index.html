<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Timemark Custom - Real Camera Support</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h2 { text-align: center; margin-top: 0; }
        .app-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .control-panel {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #cccccc; }
        .input-group input {
            width: 100%; padding: 10px; border: 1px solid #444; border-radius: 4px;
            background-color: #333; color: white; box-sizing: border-box; font-family: inherit;
        }
        
        /* Gaya Tombol */
        button {
            width: 100%; padding: 12px; background-color: #ff0000; color: white;
            border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        button:hover { background-color: #cc0000; }

        .btn-container { width: 100%; }
        .btn-half {
            width: 48%; display: inline-block; margin-top: 0; font-size: 14px; padding: 10px;
        }
        .btn-gallery { background-color: #444444; }
        .btn-gallery:hover { background-color: #555555; }
        .btn-camera { background-color: #007bff; }
        .btn-camera:hover { background-color: #0056b3; }
        .btn-snap { background-color: #28a745; margin-top: 5px; display: none; }
        .btn-snap:hover { background-color: #218838; }

        /* Area Kamera Live Stream */
        #camera-stream-container {
            display: none; width: 100%; max-width: 100%; background: #000; 
            border-radius: 8px; overflow: hidden; margin-bottom: 15px; position: relative;
        }
        #video-stream { width: 100%; height: auto; display: block; }

        /* Area Preview Gambar */
        .preview-wrapper {
            display: flex; justify-content: center; background: #000;
            border: 1px solid #444; border-radius: 8px; overflow: hidden;
        }
        #canvas-container { position: relative; display: inline-block; max-width: 100%; }
        #preview-img { display: block; max-width: 100%; height: auto; object-fit: contain; }

        /* Gaya Teks Overlay Timemark */
        .overlay { position: absolute; color: white; text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8); pointer-events: none; }
        .top-right { top: 15px; right: 15px; text-align: right; }
        .top-right .logo-text { font-size: 18px; font-weight: bold; letter-spacing: 0.5px; }
        .logo-text .time-part { color: #f2c12e; } 
        .top-right .accuracy { font-size: 12px; opacity: 0.9; }

        .right-edge {
            right: 15px; bottom: 50%; transform: rotate(-90deg); transform-origin: right bottom;
            font-size: 10px; letter-spacing: 1px; opacity: 0.7; white-space: nowrap;
        }

        .bottom-left { bottom: 25px; left: 20px; }
        .time-badge {
            background-color: #ff0000; color: white; display: inline-block; padding: 4px 10px;
            border-radius: 4px; margin-bottom: 12px; box-shadow: 1px 1px 4px rgba(0,0,0,0.5); line-height: 1; 
        }
        #out-time { font-size: 28px; font-weight: bold; letter-spacing: 1px; text-shadow: none; vertical-align: middle; }
        .check-circle {
            background-color: white; color: #ff0000; width: 22px; height: 22px; border-radius: 50%;
            display: inline-block; text-align: center; line-height: 22px; font-size: 14px; font-weight: bold;
            vertical-align: middle; margin-left: 6px;
        }

        .info-container { border-left: 3px solid #f2c12e; padding-left: 12px; }
        .info-title { font-size: 20px; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;}
        .info-date, .info-address { font-size: 14px; opacity: 0.95; margin-bottom: 3px;}
    </style>
</head>
<body>

<div class="app-container">
    <h2>Shanted™ Timemark</h2>

    <div class="control-panel">
        <div class="input-group">
            <label>Sumber Foto</label>
            <div class="btn-container">
                <button type="button" class="btn-half btn-gallery" onclick="stopCamera(); document.getElementById('imageInput').click()">📁 Buka Galeri</button>
                <button type="button" class="btn-half btn-camera" style="float: right;" onclick="startCamera()">📷 Aktifkan Kamera HP</button>
                <div style="clear: both;"></div>
            </div>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>

        <div id="camera-stream-container">
            <video id="video-stream" autoplay playsinline></video>
            <button type="button" class="btn-snap" id="snapBtn" onclick="takeSnapshot()">📸 JEPRET FOTO</button>
        </div>

        <div class="input-group">
            <label>Waktu (Jam:Menit)</label>
            <input type="text" id="timeInput" value="19:35">
        </div>
        <div class="input-group">
            <label>Judul Kegiatan</label>
            <input type="text" id="titleInput" value="CARY IN IN704500">
        </div>
        <div class="input-group">
            <label>Tanggal & Zona Waktu</label>
            <input type="text" id="dateInput" value="Minggu, 05 Juli 2026 WITA">
        </div>
        <div class="input-group">
            <label>Alamat Baris 1</label>
            <input type="text" id="address1Input" value="Pallantikang, Kec. Pattallassang, Kabupaten">
        </div>
        <div class="input-group">
            <label>Alamat Baris 2</label>
            <input type="text" id="address2Input" value="Gowa, Sulawesi Selatan 92173">
        </div>
        <div class="input-group">
            <label>Kode Verifikasi Kanan (Otomatis Acak)</label>
            <input type="text" id="verifyInput" value="">
        </div>
        <button onclick="downloadImage()">💾 Simpan Hasil Gambar</button>
    </div>

    <div class="preview-wrapper">
        <div id="canvas-container">
            <img id="preview-img" src="https://via.placeholder.com/600x800/333333/555555?text=Kamera+Aktif+Otomatis+Di+Bawah" alt="Preview">
            
            <div class="overlay top-right">
                <div class="logo-text"><span class="time-part">Time</span>mark</div>
                <div class="accuracy">Foto 100% akurat</div>
            </div>

            <div class="overlay right-edge" id="out-verify"></div>

            <div class="overlay bottom-left">
                <div class="time-badge">
                    <span id="out-time">19:35</span><div class="check-circle">✔</div>
                </div>
                <div class="info-container">
                    <div class="info-title" id="out-title">CARY IN</div>
                    <div class="info-date" id="out-date">Minggu, 05 Juli 2026 WITA</div>
                    <div class="info-address" id="out-address1">Pallantikang, Kec. Pattallassang, Kabupaten</div>
                    <div class="info-address" id="out-address2">Gowa, Sulawesi Selatan 92173</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let videoStreamTrack = null;

    function generateRandomCode(length) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = '';
        for (let i = 0; i < length; i++) { result += chars.charAt(Math.floor(Math.random() * chars.length)); }
        return result;
    }

    // Pemicu Awal saat Aplikasi dibuka
    window.onload = function() {
        // 1. Set Kode Acak
        const randomStr = generateRandomCode(14) + ' Timemark Verified';
        document.getElementById('verifyInput').value = randomStr;
        document.getElementById('out-verify').innerText = '🛡️ ' + randomStr;

        // 2. Langsung Minta Izin Kamera Aktif Saat Buka Aplikasi
        startCamera(true);
    };

    // Fungsi Menyalakan Kamera Real-Time perangkat
    function startCamera(isAutoLoad = false) {
        const constraints = {
            video: { facingMode: { exact: "environment" } } // Paksa kamera belakang HP
        };

        navigator.mediaDevices.getUserMedia(constraints)
            .then(function(stream) {
                const video = document.getElementById('video-stream');
                video.srcObject = stream;
                videoStreamTrack = stream;
                document.getElementById('camera-stream-container').style.display = 'block';
                document.getElementById('snapBtn').style.display = 'block';
                
                if(!isAutoLoad) {
                    Swal.fire({ icon: 'success', title: 'Kamera Aktif!', text: 'Kamera belakang berhasil dimuat.', timer: 1500, showConfirmButton: false });
                }
            })
            .catch(function(err) {
                // Jika gagal mendeteksi kamera belakang (misal di Laptop/PC), buka kamera default apa saja yang ada
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(function(stream) {
                        const video = document.getElementById('video-stream');
                        video.srcObject = stream;
                        videoStreamTrack = stream;
                        document.getElementById('camera-stream-container').style.display = 'block';
                        document.getElementById('snapBtn').style.display = 'block';
                    })
                    .catch(function(error) {
                        if(!isAutoLoad) {
                            Swal.fire({ icon: 'error', title: 'Gagal Akses Kamera', text: 'Pastikan memberikan izin kamera pada pengaturan APK.' });
                        }
                    });
            });
    }

    // Fungsi Matikan Aliran Kamera jika beralih ke galeri
    function stopCamera() {
        if (videoStreamTrack) {
            videoStreamTrack.getTracks().forEach(track => track.stop());
            document.getElementById('camera-stream-container').style.display = 'none';
        }
    }

    // Fungsi Menangkap / Jepret Gambar dari Live Video Kamera
    function takeSnapshot() {
        const video = document.getElementById('video-stream');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataURL = canvas.toDataURL('image/jpeg');
        document.getElementById('preview-img').src = dataURL;
        
        // Matikan kamera setelah dijepret agar hemat baterai HP
        stopCamera();

        Swal.fire({ icon: 'success', title: 'Berhasil Dijepret!', text: 'Foto berhasil dimasukkan ke template timemark.', timer: 1800, showConfirmButton: false });
    }

    // Ambil Gambar dari file Galeri tradisional
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('preview-img').src = event.target.result;
                Swal.fire({ icon: 'success', title: 'Foto Dimuat!', text: 'Gambar dari galeri berhasil dipasang.', timer: 1500, showConfirmButton: false });
            }
            reader.readAsDataURL(file);
        }
    });

    function syncInput(inputId, outputId, prefix = "") {
        document.getElementById(inputId).addEventListener('input', function(e) {
            document.getElementById(outputId).innerText = prefix + e.target.value;
        });
    }
    syncInput('timeInput', 'out-time');
    syncInput('titleInput', 'out-title');
    syncInput('dateInput', 'out-date');
    syncInput('address1Input', 'out-address1');
    syncInput('address2Input', 'out-address2');
    syncInput('verifyInput', 'out-verify', '🛡️ '); 

    // Simpan Gambar dengan Alert Keren
    function downloadImage() {
        Swal.fire({
            title: 'Sedang memproses...',
            text: 'Membuat watermark timemark jernih.',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        const container = document.getElementById('canvas-container');
        html2canvas(container, { useCORS: true, scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'timemark_verified_snapshot.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            Swal.fire({ icon: 'success', title: 'Berhasil Disimpan!', text: 'Gambar timemark sudah tersimpan di folder unduhan perangkat.', confirmButtonColor: '#ff0000' });
        });
    }
</script>

</body>
</html>
